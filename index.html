<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>任務板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07080d;
    --panel-1:#10121c;
    --panel-2:#0b0d14;
    --line:rgba(233,196,106,.16);
    --line-soft:rgba(233,196,106,.10);
    --gold:#e9c46a;
    --gold-hi:#f7e3a1;
    --gold-deep:#c9a227;
    --gold-dim:#8a7a4a;
    --cyan:#5ff0dc;
    --cyan-deep:#173a37;
    --pink:#ff6b81;
    --text:#e8eaf2;
    --muted:#757b90;
    --dim:#454a5e;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overscroll-behavior-y:none; }
  body {
    font-family:'Noto Sans TC', sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100dvh;
    min-height:-webkit-fill-available;
    overflow:hidden;
    position:relative;
    display:flex; flex-direction:column;
  }
  /* 網格 + 頂部金光暈（背景層） */
  body::after{
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(120% 55% at 50% -8%, rgba(233,196,106,.10), transparent 55%),
      linear-gradient(rgba(233,196,106,.030) 1px, transparent 1px) 0 0/100% 36px,
      linear-gradient(90deg, rgba(233,196,106,.030) 1px, transparent 1px) 0 0/36px 100%;
  }
  /* CRT 掃描線（最上層薄薄一片，不擋點擊） */
  body::before{
    content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 4px);
    opacity:.55; animation:flick 7s steps(40) infinite;
  }
  @keyframes flick{ 0%,97%,100%{opacity:.55;} 98%{opacity:.42;} 99%{opacity:.6;} }

  main, header, nav, #pickOverlay { position:relative; z-index:1; }

  /* ===== 登入遮罩 ===== */
  #pickOverlay {
    position:fixed; inset:0; background:var(--bg); z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:24px;
  }
  #pickOverlay .logo{ font-size:50px; filter:drop-shadow(0 4px 20px rgba(233,196,106,.4)); animation:bob 3s ease-in-out infinite; }
  @keyframes bob{ 50%{ transform:translateY(-8px);} }
  #pickOverlay h1 { font-family:var(--mono); font-size:26px; font-weight:800; letter-spacing:6px; color:var(--gold); }
  #pickOverlay .sub{ font-family:var(--mono); color:var(--muted); font-size:12px; letter-spacing:2px; margin-top:-10px; }
  .loginInput {
    width:min(300px,82vw); padding:15px 18px; border-radius:10px;
    border:1px solid var(--line); background:#0c0e15; color:var(--text);
    font-size:16px; font-family:var(--mono); text-align:center; letter-spacing:1px;
    transition:border-color .2s, box-shadow .2s;
  }
  .loginInput:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(233,196,106,.12), 0 0 20px rgba(233,196,106,.1); }
  .pickBtn {
    width:min(300px,82vw); padding:15px; border:none; border-radius:10px;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold-deep)); color:#1a1206;
    font-size:16px; font-weight:800; font-family:var(--mono); letter-spacing:3px; cursor:pointer;
    box-shadow:0 0 0 1px rgba(233,196,106,.4), 0 8px 24px rgba(233,196,106,.18); transition:transform .12s, box-shadow .12s;
  }
  .pickBtn:active { transform:translateY(2px) scale(.98); }
  #loginMsg{ color:var(--pink); font-size:13px; font-weight:700; font-family:var(--mono); min-height:20px; }

  /* ===== header：HUD 狀態列 ===== */
  header {
    padding:13px 14px 11px;
    display:flex; align-items:center; gap:12px;
    position:relative; flex-shrink:0;
    background:linear-gradient(180deg, #0a0b12 40%, rgba(7,8,13,.82));
    border-bottom:1px solid var(--line);
  }
  header::after{
    content:''; position:absolute; left:0; right:0; bottom:-1px; height:1px;
    background:linear-gradient(90deg, transparent, rgba(233,196,106,.5), transparent);
  }
  .avatar{
    width:46px; height:46px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; font-family:var(--mono);
    color:var(--gold);
    background:linear-gradient(145deg,#14161f,#0c0e15);
    border:1px solid rgba(233,196,106,.5);
    box-shadow:inset 0 0 14px rgba(233,196,106,.14), 0 4px 14px rgba(0,0,0,.5);
  }
  .idblock{ flex:1; min-width:0; }
  .nameRow{ display:flex; align-items:center; gap:8px; }
  #myName{ font-size:16px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:118px; }
  .lvPill{
    flex-shrink:0; font-family:var(--mono); font-size:11px; font-weight:800; letter-spacing:.5px;
    padding:3px 9px; border-radius:5px; color:#1a1206;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold-deep));
    box-shadow:0 0 12px rgba(233,196,106,.3);
  }
  #switchBtn{
    flex-shrink:0; background:none; border:1px solid var(--line); color:var(--muted);
    border-radius:6px; padding:2px 8px; font-size:11px; font-family:var(--mono); cursor:pointer;
  }
  .xpWrap{ display:flex; align-items:center; gap:8px; margin-top:7px; }
  .xpBar{ flex:1; height:8px; border-radius:3px; background:#12141d; overflow:hidden; position:relative;
    border:1px solid var(--line-soft); }
  .xpFill{
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--gold-deep),var(--gold-hi));
    box-shadow:0 0 10px rgba(233,196,106,.55);
    transition:width .6s cubic-bezier(.22,1,.36,1); position:relative;
  }
  .xpFill::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
    transform:translateX(-100%); animation:shine 2.6s ease-in-out infinite;
  }
  @keyframes shine{ 55%,100%{ transform:translateX(240%);} }
  /* 分段格線疊在條上 */
  .xpBar::after{
    content:''; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(90deg, transparent 0 11px, rgba(7,8,13,.85) 11px 12px);
  }
  .xpTxt{ font-family:var(--mono); font-size:10px; color:var(--muted); font-weight:700; flex-shrink:0; }

  .hdr-right{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  #coinBox {
    display:flex; align-items:center; gap:6px;
    background:linear-gradient(145deg,#12141d,#0c0e15);
    border:1px solid rgba(233,196,106,.5);
    border-radius:9px; padding:7px 12px;
    box-shadow:inset 0 0 12px rgba(233,196,106,.08), 0 3px 12px rgba(0,0,0,.4);
  }
  #coinBox.pulse{ animation:coinpulse .5s ease; }
  @keyframes coinpulse{ 30%{ transform:scale(1.14); box-shadow:inset 0 0 12px rgba(233,196,106,.2), 0 0 20px rgba(233,196,106,.4);} }
  #coinBox .amt { font-family:var(--mono); font-size:18px; font-weight:800; color:var(--gold); font-variant-numeric:tabular-nums; }
  .iconBtn{
    background:none; border:1px solid var(--line); color:var(--muted);
    border-radius:6px; padding:3px 8px; font-size:13px; font-family:inherit; cursor:pointer; line-height:1;
  }

  /* ===== tabs ===== */
  nav {
    position:relative; flex-shrink:0;
    display:flex; gap:2px; padding:6px 8px calc(6px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, #090a11, #07080d);
    border-top:1px solid var(--line);
  }
  .navBadge{
    position:absolute; top:1px; right:calc(50% - 22px); min-width:16px; height:16px; padding:0 4px;
    display:none; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:9.5px; font-weight:800; color:#fff;
    background:var(--pink); border-radius:99px; box-shadow:0 0 10px rgba(255,107,129,.5);
  }
  .navBadge.show{ display:flex; }
  nav::before{
    content:''; position:absolute; left:0; right:0; top:-1px; height:1px;
    background:linear-gradient(90deg, transparent, rgba(233,196,106,.45), transparent);
  }
  nav button {
    position:relative; flex:1; padding:9px 0 7px; background:none; border:none; border-radius:8px;
    color:var(--dim); font-size:11px; font-weight:700; font-family:var(--mono); letter-spacing:1px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px; transition:color .2s;
  }
  nav button .ic{ font-size:18px; transition:transform .2s, filter .2s; filter:grayscale(.5) opacity(.7); }
  nav button.on { color:var(--gold); }
  nav button.on .ic{ transform:translateY(-1px); filter:drop-shadow(0 0 8px rgba(233,196,106,.6)); }
  nav button.on::before{
    content:''; position:absolute; top:1px; left:50%; transform:translateX(-50%);
    width:22px; height:2px; border-radius:2px; background:var(--gold); box-shadow:0 0 8px var(--gold);
  }
  nav button:active{ transform:scale(.94); }

  main {
    flex:1; min-height:0; overflow-y:auto;
    -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain;
    padding:16px 16px 24px;
  }
  .page { display:none; animation:pagein .32s ease; }
  .page.on { display:block; }
  @keyframes pagein{ from{ opacity:0; transform:translateY(8px);} }

  h2 {
    font-family:var(--mono); font-size:11px; color:var(--gold-dim); font-weight:700;
    margin:22px 2px 11px; letter-spacing:2px; display:flex; align-items:center; gap:8px;
  }
  h2::before{ content:'▍'; color:var(--gold); font-size:13px; }
  h2:first-child { margin-top:2px; }

  .card {
    position:relative;
    background:linear-gradient(160deg,var(--panel-1),var(--panel-2));
    border-radius:10px; padding:15px 16px; margin-bottom:11px;
    border:1px solid var(--line);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 6px 20px rgba(0,0,0,.45);
  }
  /* HUD 角標 */
  .card::before, .card::after{
    content:''; position:absolute; width:11px; height:11px; pointer-events:none;
    border:1.5px solid rgba(233,196,106,.55);
  }
  .card::before{ top:-1px; left:-1px; border-right:0; border-bottom:0; border-top-left-radius:10px; }
  .card::after{ bottom:-1px; right:-1px; border-left:0; border-top:0; border-bottom-right-radius:10px; }
  .card.pop{ animation:pop .42s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes pop{ from{ opacity:0; transform:scale(.92) translateY(10px);} }
  .card .title { font-size:15.5px; font-weight:900; margin-bottom:2px; line-height:1.4; letter-spacing:.2px; }
  .card .sub { font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:.3px; }
  .card .row { display:flex; align-items:center; justify-content:space-between; margin-top:14px; }
  .reward { font-family:var(--mono); font-size:15px; font-weight:800; color:var(--gold); letter-spacing:.5px;
    display:inline-flex; align-items:center; gap:5px; }

  .btn {
    border:none; border-radius:8px; padding:10px 18px;
    font-size:14px; font-weight:800; font-family:var(--mono); letter-spacing:1px; cursor:pointer;
    transition:transform .12s, box-shadow .12s, opacity .2s;
  }
  .btn:active { transform:translateY(2px) scale(.97); }
  .btn.gold { background:linear-gradient(180deg,var(--gold-hi),var(--gold-deep)); color:#1a1206;
    box-shadow:0 0 0 1px rgba(233,196,106,.4), 0 6px 16px rgba(233,196,106,.18); }
  .btn.blue { background:linear-gradient(180deg,#1a413d,var(--cyan-deep)); color:var(--cyan);
    border:1px solid rgba(95,240,220,.45); box-shadow:0 0 14px rgba(95,240,220,.16); }
  .btn:disabled { opacity:.35; box-shadow:none; }

  .badge {
    display:inline-block; font-family:var(--mono); font-size:10.5px; font-weight:700; letter-spacing:.5px;
    padding:3px 9px; border-radius:5px; margin-left:8px; vertical-align:2px;
  }
  .badge.wait { background:rgba(233,196,106,.12); color:var(--gold); border:1px solid rgba(233,196,106,.25); }
  .badge.back { background:rgba(255,107,129,.13); color:var(--pink); border:1px solid rgba(255,107,129,.3); }
  .badge.mine { background:rgba(95,240,220,.12); color:var(--cyan); border:1px solid rgba(95,240,220,.3); }
  .badge.done { background:rgba(95,240,220,.12); color:var(--cyan); border:1px solid rgba(95,240,220,.28); }
  .badge.redeem { background:rgba(233,196,106,.12); color:var(--gold); border:1px solid rgba(233,196,106,.25); }
  .badge.streak { background:rgba(255,140,60,.16); color:#ff9d5c; border:1px solid rgba(255,140,60,.4); }

  .empty { font-family:var(--mono); text-align:center; color:var(--dim); font-size:13px; letter-spacing:1px; padding:26px 0; }

  /* ===== 排行榜 ===== */
  .rankTabs{ display:flex; gap:7px; margin:2px 0 16px; }
  .rankTabs button{
    flex:1; padding:9px 0; border:1px solid var(--line); border-radius:8px;
    background:#0d0f17; color:var(--muted); font-size:12px; font-weight:700; font-family:var(--mono); letter-spacing:.5px;
    cursor:pointer; transition:.2s;
  }
  .rankTabs button.on{ background:linear-gradient(180deg,var(--gold-hi),var(--gold-deep)); color:#1a1206; border-color:transparent;
    box-shadow:0 0 16px rgba(233,196,106,.22); }
  .rankRow{
    display:flex; align-items:center; gap:12px; padding:12px 14px; margin-bottom:9px;
    background:linear-gradient(160deg,var(--panel-1),var(--panel-2));
    border-radius:8px; border:1px solid var(--line); box-shadow:0 5px 16px rgba(0,0,0,.4);
  }
  .rankRow.first{ border-color:rgba(233,196,106,.6);
    box-shadow:0 0 24px rgba(233,196,106,.16), inset 0 0 20px rgba(233,196,106,.05);
    background:linear-gradient(160deg,#181523,#0f0c17); }
  .rankRow.me{ border-color:rgba(95,240,220,.6); box-shadow:0 0 18px rgba(95,240,220,.14); }
  .rankNo{ width:30px; text-align:center; font-family:var(--mono); font-size:16px; font-weight:800; color:var(--gold-dim); flex-shrink:0; }
  .rankRow.first .rankNo{ font-size:22px; }
  .rankAv{ width:38px; height:38px; border-radius:9px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:16px; font-weight:800; color:var(--gold);
    background:linear-gradient(145deg,#14161f,#0c0e15); border:1px solid var(--line); }
  .rankInfo{ flex:1; min-width:0; }
  .rankName{ font-size:15px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rankSubLv{ font-family:var(--mono); font-size:10.5px; color:var(--muted); font-weight:700; letter-spacing:.5px; }
  .meTag{ font-family:var(--mono); font-size:10px; font-weight:800; color:var(--cyan); background:rgba(95,240,220,.12);
    border:1px solid rgba(95,240,220,.3); padding:1px 6px; border-radius:4px; margin-left:6px; }
  .rankVal{ font-family:var(--mono); font-size:18px; font-weight:800; color:var(--gold); flex-shrink:0; font-variant-numeric:tabular-nums; }

  /* ===== 成就牆 ===== */
  .achGrid{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin:2px 0 4px; }
  .achCell{
    aspect-ratio:1; border-radius:9px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    background:linear-gradient(160deg,var(--panel-1),var(--panel-2));
    border:1px solid var(--line-soft); position:relative; transition:transform .12s;
  }
  .achCell:active{ transform:scale(.92); }
  .achCell .aic{ font-size:22px; filter:grayscale(1) opacity(.3); }
  .achCell.got{ border-color:rgba(233,196,106,.5); box-shadow:0 0 14px rgba(233,196,106,.12), inset 0 0 12px rgba(233,196,106,.05); }
  .achCell.got .aic{ filter:drop-shadow(0 0 6px rgba(233,196,106,.5)); }
  .achCell .aname{ font-family:var(--mono); font-size:8px; font-weight:700; color:var(--dim); text-align:center; line-height:1.1; padding:0 2px; letter-spacing:.3px; }
  .achCell.got .aname{ color:var(--gold); }

  /* ===== toast ===== */
  #toast {
    position:fixed; left:50%; bottom:86px; transform:translateX(-50%) translateY(10px);
    background:linear-gradient(180deg,#141620,#0c0e15); color:var(--gold); font-weight:700; font-family:var(--mono); font-size:14px; letter-spacing:.5px;
    padding:12px 22px; border-radius:9px; z-index:200;
    border:1px solid rgba(233,196,106,.5);
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
    max-width:85vw; text-align:center; box-shadow:0 0 26px rgba(233,196,106,.14), 0 8px 24px rgba(0,0,0,.6);
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ===== 飛幣 ===== */
  .flycoin{ position:fixed; z-index:250; font-size:24px; pointer-events:none;
    filter:drop-shadow(0 2px 8px rgba(233,196,106,.7)); will-change:transform,opacity; }

  /* ===== LEVEL UP ===== */
  #levelup{
    position:fixed; inset:0; z-index:400; display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:8px;
    background:radial-gradient(circle at center, rgba(12,12,20,.9), rgba(3,3,6,.97));
    overflow:hidden;
  }
  #levelup.show{ display:flex; animation:lufade .3s ease; }
  @keyframes lufade{ from{ opacity:0; } }
  #levelup .luLabel{ font-family:var(--mono); font-size:14px; font-weight:800; letter-spacing:10px; color:var(--gold); opacity:.9; padding-left:10px; }
  #levelup .luBig{
    font-family:var(--mono); font-size:62px; font-weight:800; color:transparent;
    background:linear-gradient(180deg,#fff6d8,var(--gold) 55%,var(--gold-deep));
    -webkit-background-clip:text; background-clip:text; letter-spacing:2px;
    text-shadow:0 8px 44px rgba(233,196,106,.5);
    animation:lupop .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes lupop{ 0%{ transform:scale(.3) rotate(-6deg); opacity:0;} 60%{ transform:scale(1.12);} 100%{ transform:scale(1); opacity:1;} }
  #levelup .luTitle{ font-family:var(--mono); font-size:16px; font-weight:700; color:var(--text); letter-spacing:2px; }
  .luRay{ position:absolute; width:200%; height:200%; z-index:-1;
    background:conic-gradient(from 0deg, transparent 0 8deg, rgba(233,196,106,.12) 8deg 15deg, transparent 15deg 23deg,
      rgba(95,240,220,.07) 23deg 30deg, transparent 30deg 38deg);
    animation:rayspin 14s linear infinite; }
  @keyframes rayspin{ to{ transform:rotate(360deg);} }

  /* ===== 成就解鎖彈窗 ===== */
  #achPop{
    position:fixed; left:50%; top:22%; transform:translateX(-50%);
    z-index:420; display:none; flex-direction:column; align-items:center; gap:8px;
    padding:20px 26px; border-radius:14px; min-width:220px; max-width:80vw;
    background:linear-gradient(160deg,#16161f,#0b0c13);
    border:1px solid rgba(233,196,106,.55);
    box-shadow:0 20px 50px rgba(0,0,0,.6), 0 0 44px rgba(233,196,106,.2);
    text-align:center;
  }
  #achPop.show{ display:flex; animation:achslide .45s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes achslide{ from{ opacity:0; transform:translateX(-50%) translateY(-30px);} }
  #achPop .apLabel{ font-family:var(--mono); font-size:11px; font-weight:800; letter-spacing:3px; color:var(--gold); }
  #achPop .apIcon{ font-size:46px; animation:achdrop .6s cubic-bezier(.34,1.7,.5,1) .05s both; filter:drop-shadow(0 0 10px rgba(233,196,106,.4)); }
  @keyframes achdrop{ 0%{ transform:translateY(-40px) scale(.4); opacity:0;} 60%{ transform:translateY(6px) scale(1.15);} 100%{ transform:translateY(0) scale(1);} }
  #achPop .apName{ font-size:18px; font-weight:900; color:#fff; }
  #achPop .apDesc{ font-family:var(--mono); font-size:11.5px; color:var(--muted); font-weight:600; letter-spacing:.3px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001s !important; transition-duration:.05s !important; }
    body::before{ display:none; }
  }
</style>
</head>
<body>

<div id="pickOverlay">
  <div class="logo">🎮</div>
  <h1>TASKBOARD</h1>
  <div class="sub">做任務 · 賺金幣 · 換獎勵</div>
  <input class="loginInput" id="idInput" placeholder="你的 ID" autocomplete="off">
  <input class="loginInput" id="loginPw" type="password" placeholder="密碼">
  <button class="pickBtn" id="loginBtn">進入</button>
  <div id="loginMsg"></div>
</div>

<header>
  <div class="avatar" id="avatar">🎮</div>
  <div class="idblock">
    <div class="nameRow">
      <span id="myName">—</span>
      <span class="lvPill" id="lvPill">Lv.1</span>
      <button id="switchBtn">換人</button>
    </div>
    <div class="xpWrap">

function xpThreshold(lv){ return 50 * (lv - 1) * (lv + 2); }
function levelFromXp(xp){
  let lv = 1;
  while (xp >= xpThreshold(lv + 1)) lv++;
  return lv;
}

  let t = TITLES[0].name;
  for(const x of TITLES){ if(lv >= x.lv) t = x.name; }
  return t;
}

let audioCtx = null;
let muted = localStorage.getItem('tb_muted') === '1';
function ensureAudio(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return; }
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('click', ensureAudio);
document.addEventListener('touchstart', ensureAudio, { passive:true });

function tone(freq, dur, type='sine', vol=0.2, when=0){
  if(muted || !audioCtx) return;
  const t0 = audioCtx.currentTime + when;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + dur + 0.03);
}
function noiseBurst(dur=0.08, vol=0.25){
  if(muted || !audioCtx) return;
  const buf = audioCtx.createBuffer(1, Math.max(1, audioCtx.sampleRate*dur), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = vol;
  src.connect(g); g.connect(audioCtx.destination); src.start();
}

function animateNumber(el, from, to, dur=600){
  from = Number(from)||0; to = Number(to)||0;
  if(from === to){ el.textContent = to; return; }
  const t0 = performance.now();
  const ease = x => 1 - Math.pow(1-x, 3);
  function step(now){
    const p = Math.min(1, (now - t0)/dur);
    el.textContent = Math.round(from + (to - from)*ease(p));
    if(p < 1) requestAnimationFrame(step);
    else el.textContent = to;
  }
  requestAnimationFrame(step);
}

  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function todayKey(){
  return new Date().toLocaleDateString('en-CA', { timeZone:'Asia/Taipei' });
}
// dateKey 的前一天（轉 Date 減一天再轉回，避免手拆字串）
function prevKey(dateKey){
  return new Date(new Date(dateKey).getTime() - 86400000).toISOString().slice(0,10);
}

// 只為自己(me)生成當日每日任務 + 過期處理
async function ensureDailyTasks(){
  if(!me) return;
  const today = todayKey();
  for(const tpl of dailyTemplates){
    if(!tpl.active) continue;
    const id = `daily_${tpl.id}_${me}_${today}`;
    if(tasks.some(t => t.id === id)) continue;
    try {
      await setDoc(doc(db,'tasks',id), {
        isDaily:true, templateId:tpl.id, dateKey:today,
        title:tpl.title, reward:tpl.reward, note:tpl.note || '',
        assignee:me, status:'open', claimedBy:null, wasRejected:false,
        createdAt: serverTimestamp()
      });
    } catch(e){}
  }
  // 過期：自己的、昨天以前、還 open 的每日任務（pending 不動，留給媽媽補審）
  for(const t of tasks){
    if(t.isDaily && t.assignee===me && t.status==='open' && t.dateKey < today){
      updateDoc(doc(db,'tasks',t.id), { status:'expired' }).catch(()=>{});
    }
  }
}

function scheduleEnsureDaily(){ clearTimeout(dailyTimer); dailyTimer = setTimeout(ensureDailyTasks, 400); }

window.buyItem = async (itemId)=>{
  const item = shopItems.find(i=>i.id===itemId);
  if(!item) return;
  if(!confirm(`要用 ${item.price} 金幣買「${item.name}」嗎？`)) return;
  try {
    await runTransaction(db, async tx=>{
      const pRef = doc(db,'players',me);
      const s = await tx.get(pRef);
      const coins = s.data().coins || 0;
      if(coins < item.price) throw new Error('金幣不夠，先去做任務吧 💪');
      tx.update(pRef, { coins: coins - item.price });
      const buyRef = doc(collection(db,'purchases'));
      tx.set(buyRef, {
        playerId: me, itemName: item.name, price: item.price,
        status: 'owned', createdAt: serverTimestamp()
      });
    });
    sfxBuy();
    toast('已放進背包 🎒');
  } catch(e){ sfxError(); toast(e.message); }
};

    sfxBuy();
    toast('已送出，找媽媽核銷 🎁');
  } catch(e){ sfxError(); toast(e.message); }
};

/* ==================================================================
   畫面
================================================================== */
const seen = {};
function cardCls(container, id){
  if(!seen[container]) seen[container] = new Set();
  if(seen[container].has(id)) return 'card';
  seen[container].add(id);
  return 'card pop';
}

function taskCard(container, t, btnHtml, badge=''){
  return `<div class="${cardCls(container,t.id)}">
    <div class="title">${esc(t.title)}${badge}</div>
    <div class="row">
      <div class="reward">🪙 ${t.reward}</div>
      ${btnHtml}
    </div>
  </div>`;
}

let lastLevel = null;
let lastCoins = null;

function renderHeader(){
  if(!me || !players[me]) return;
  const p = players[me];
  const name = p.name || me;
  $('myName').textContent = name;
  $('avatar').textContent = (name.trim()[0] || '🎮');

  const xp = p.xp ?? 0;
  const lv = levelFromXp(xp);
  $('lvPill').textContent = 'Lv.' + lv;

  const floor = xpThreshold(lv), ceil = xpThreshold(lv+1);
  const pct = ceil > floor ? Math.min(100, Math.round((xp - floor)/(ceil - floor)*100)) : 100;
  $('xpFill').style.width = pct + '%';
  $('xpTxt').textContent = `${xp - floor} / ${ceil - floor}`;

  if(lastLevel !== null && lv > lastLevel) showLevelUp(lv);
  lastLevel = lv;

  const coins = p.coins ?? 0;
  if(lastCoins === null){
    $('myCoins').textContent = coins;
  } else if(coins !== lastCoins){
    animateNumber($('myCoins'), lastCoins, coins);
    if(coins > lastCoins){ flyCoins(4); if(!muted) sfxCoin(); }
  }
  lastCoins = coins;
}

function renderAll(){
  if(!me || !players[me]) return;
  renderHeader();
  renderDaily();

  const mine = tasks.filter(t => !t.isDaily && (
    (t.status==='open' && t.assignee===me) ||
    (t.status==='claimed' && t.claimedBy===me)
  ));
  $('myTasks').innerHTML = mine.length ? mine.map(t=>{
    const badge = t.wasRejected ? '<span class="badge back">被退回，再做一次</span>'
                : (t.status==='claimed' ? '<span class="badge mine">我搶到的</span>' : '');
    return taskCard('myTasks', t, `<button class="btn gold" onclick="reportDone('${t.id}')">完成回報</button>`, badge);
  }).join('') : '<div class="empty">目前沒有任務，爽 😎</div>';

  const open = tasks.filter(t => !t.isDaily && t.status==='open' && t.assignee==='all');
  $('openTasks').innerHTML = open.length ? open.map(t=>
    taskCard('openTasks', t, `<button class="btn blue" onclick="grabTask('${t.id}')">搶任務 ⚡</button>`)
  ).join('') : '<div class="empty">沒有可以搶的</div>';

  const pending = tasks.filter(t => !t.isDaily && t.status==='pending' && (t.claimedBy===me || t.assignee===me));
  $('pendingTasks').innerHTML = pending.length ? pending.map(t=>
    taskCard('pendingTasks', t, '<span class="badge wait">審核中</span>')
  ).join('') : '<div class="empty">沒有等審核的</div>';

  renderLog();
  if($('page-rank').classList.contains('on')) renderRank();
}

/* ===== 每日任務區塊（只顯示自己當天的） ===== */
function renderDaily(){
  if(!me || !players[me]) return;
  const today = todayKey();
  const streaks = players[me].dailyStreaks || {};
  const list = tasks.filter(t => t.isDaily && t.assignee===me && t.dateKey===today && t.status!=='expired');
  $('dailyTasks').innerHTML = list.length ? list.map(t=>{
    const sc = streaks[t.templateId]?.count || 0;
    const fire = sc > 0 ? `<span class="badge streak">🔥x${sc}</span>` : '';
    let ctrl = '', badge = '';
    if(t.status==='open')        ctrl = `<button class="btn gold" onclick="reportDone('${t.id}')">完成回報</button>`;
    else if(t.status==='pending') badge = '<span class="badge wait">審核中</span>';
    else if(t.status==='done')    badge = '<span class="badge done">已完成 ✅</span>';
    return `<div class="${cardCls('daily',t.id)}">
      <div class="title">${esc(t.title)}${fire}${badge}</div>
      ${t.note ? `<div class="sub">${esc(t.note)}</div>` : ''}
      <div class="row">
        <div class="reward">🪙 ${t.reward}</div>
        ${ctrl}
      </div>
    </div>`;
  }).join('') : '<div class="empty">今天沒有每日任務</div>';
}

// 依分類分組：回傳 [[分類名, 商品陣列(價格低到高)], ...]，組間依組內最低價排序，「其他」永遠最後
function groupByCategory(items){
  const groups = {};
  items.forEach(i=>{
    const c = (i.category && i.category.trim()) || '其他';
    (groups[c] || (groups[c] = [])).push(i);
  });
  Object.values(groups).forEach(arr => arr.sort((a,b)=> (a.price||0) - (b.price||0)));
  return Object.entries(groups).sort((a,b)=>{
    if(a[0]==='其他') return 1;
    if(b[0]==='其他') return -1;
    const minA = Math.min(...a[1].map(x=>x.price||0));
    const minB = Math.min(...b[1].map(x=>x.price||0));
    return minA - minB;
  });
}

function renderShop(){
  if(!shopItems.length){ $('shopList').innerHTML = '<div class="empty">商店還沒上架東西</div>'; return; }
  $('shopList').innerHTML = groupByCategory(shopItems).map(([cat, items])=>
    `<h2>${esc(cat)}</h2>` + items.map(i=>`
    <div class="${cardCls('shop',i.id)}">
      <div class="title">${esc(i.name)}</div>
      ${i.desc ? `<div class="sub">${esc(i.desc)}</div>` : ''}
      <div class="row">
        <div class="reward">🪙 ${i.price}</div>
        <button class="btn gold" onclick="buyItem('${i.id}')">購買</button>
      </div>
    </div>`).join('')
  ).join('');
}

function renderRank(){
  const rows = Object.entries(players)
    .map(([id,p])=>({ id, name:p.name||id, val:p[rankMode] ?? 0, tasksDone:p.tasksDone ?? 0, lv:levelFromXp(p.xp ?? 0) }))
    .sort((a,b)=> b.val - a.val || (b.tasksDone ?? 0) - (a.tasksDone ?? 0) || a.name.localeCompare(b.name));

  $('rankList').innerHTML = rows.length ? rows.map((r,i)=>{
    const cls = 'rankRow' + (i===0 ? ' first' : '') + (r.id===me ? ' me' : '');
    const no = i===0 ? '👑' : (i+1);
    return `<div class="${cls}">
      <div class="rankNo">${no}</div>
      <div class="rankAv">${esc(r.name.trim()[0]||'?')}</div>
      <div class="rankInfo">
        <div class="rankName">${esc(r.name)}${r.id===me?'<span class="meTag">我</span>':''}</div>
        <div class="rankSubLv">Lv.${r.lv} · ${esc(titleFromLevel(r.lv))}</div>
      </div>
      <div class="rankVal">${r.val}</div>
    </div>`;
  }).join('') : '<div class="empty">還沒有人上榜</div>';
}

function renderAchWall(){
  const got = localUnlocked || new Set();
  $('achTitle').innerHTML = `成就牆 <span style="color:var(--gold)">${got.size}/${ACHIEVEMENTS.length}</span>`;
  $('achWall').innerHTML = ACHIEVEMENTS.map(a=>{
    const has = got.has(a.id);
    return `<div class="achCell ${has?'got':''}" onclick="showAch('${a.id}')">
      <div class="aic">${has ? a.icon : '🔒'}</div>
      <div class="aname">${has ? esc(a.name) : '???'}</div>
    </div>`;
  }).join('');
}
window.showAch = (id)=>{
  const a = ACHIEVEMENTS.find(x=>x.id===id);
  if(!a) return;
  const has = (localUnlocked||new Set()).has(id);
  toast(has ? `${a.icon} ${a.name}：${a.desc} ✅` : `🔒 解鎖條件：${a.desc}`);
};

function renderLog(){
  if(!me) return;
  renderAchWall();

  const done = tasks.filter(t => t.status==='done' && (t.claimedBy===me || t.assignee===me)).slice(0,20);
  $('doneTasks').innerHTML = done.length ? done.map(t=>`
    <div class="${cardCls('done',t.id)}">
      <div class="title">${t.isDaily?'📅 ':''}${esc(t.title)}<span class="badge done">已入帳</span></div>
      <div class="sub">🪙 +${t.reward}</div>
    </div>
  `).join('') : '<div class="empty">還沒有完成紀錄</div>';
}

/* ===== 背包：可使用(owned) / 等媽媽核銷(pending) / 使用紀錄(redeemed) ===== */
function renderBag(){
  if(!me) return;
  const owned = purchases.filter(p=>p.playerId===me && p.status==='owned');
  const pend  = purchases.filter(p=>p.playerId===me && p.status==='pending');
  const used  = purchases.filter(p=>p.playerId===me && p.status==='redeemed').slice(0,15);

  $('ownedList').innerHTML = owned.length ? owned.map(p=>`
    <div class="${cardCls('owned',p.id)}">
      <div class="title">${esc(p.itemName)}</div>
      <div class="row">
        <div class="reward">🪙 ${p.price}</div>
        <button class="btn gold" onclick="useItem('${p.id}')">使用</button>
      </div>
    </div>
  `).join('') : '<div class="empty">背包是空的，去商店逛逛 🛒</div>';

  $('pendingBuys').innerHTML = pend.length ? pend.map(p=>`
    <div class="${cardCls('pbuy',p.id)}">
      <div class="title">${esc(p.itemName)}<span class="badge redeem">待核銷</span></div>
      <div class="sub">🪙 ${p.price}</div>
    </div>
  `).join('') : '<div class="empty">沒有等核銷的</div>';

  $('usedList').innerHTML = used.length ? used.map(p=>`
    <div class="${cardCls('used',p.id)}">
      <div class="title">${esc(p.itemName)}<span class="badge done">已使用</span></div>
      <div class="sub">🪙 ${p.price}</div>
    </div>
  `).join('') : '<div class="empty">還沒有使用紀錄</div>';

  const b = $('navBag');
  b.textContent = owned.length;
  b.classList.toggle('show', owned.length > 0);
}
</script>
